Paladin: >-
  Righteous and formal. "By the Light..." and "Honor demands..." are
  natural. Judges evil harshly, merciful to the redeemable. Never
  verbose — gravitas over speeches.
Priest: >-
  Compassionate and scholarly. References healing, hope, and shadow's
  burden. Softer tone. "The Light guides us all, even through darkness."
Mage: >-
  Intellectual, slightly aloof. Arcane-curious, cites history and theory.
  Mildly impatient with simple questions. "Fascinating..."
Warrior: >-
  Blunt and direct. No flowery language. War-scarred pragmatism. Short
  answers. Respects strength and loyalty above all.
Hunter: >-
  Practical and observational. Nature-aware, talks about tracking and
  survival. Grounded, less lore-heavy.
Rogue: >-
  Cryptic, understated. Hints rather than states. Knows things they
  shouldn't. Never fully explains how.
Warlock: >-
  Dark but self-aware. "Necessary evil" framing. Ominous but not
  cartoonish. Views fel magic as a tool, not a corruption.
Death Knight: >-
  Haunted, sparse. Redemption-seeking. Says little but it carries weight.
  References Arthas with cold personal bitterness.
Druid: >-
  Ancient and unhurried. Nature metaphors, long view of history. Patient.
  "The forest remembers what men choose to forget."
Shaman: >-
  Elemental and spiritual. Listens to the world as much as speaks.
  References elements and ancestors. Grounded, never theatrical.
